name: montandon-examples
channels:
  - conda-forge
# Only 'conda-forge' — dropping 'defaults' avoids channel conflict resolution
# which is a major source of slow solver times on Binder.
channel_priority: strict
dependencies:
  - python=3.11  # 3.11 has more pre-built binaries than 3.12, faster install
  - pip

  # Geospatial packages (conda only — need compiled C extensions)
  - geopandas
  - shapely

  # Jupyter kernel (conda for reliability)
  - jupyterlab
  - ipywidgets
  - ipykernel

  # Everything else via pip — much faster than conda for pure-Python packages
  - pip:
    # Core data/API packages
    - pystac-client
    - pystac
    - pandas
    - numpy
    - requests
    # Visualization
    - matplotlib
    - seaborn
    - plotly
    - folium
    # Analysis
    - scikit-learn
    - statsmodels
    # Utilities
    - pillow
    - python-dateutil
    # Browser automation (chromium + chromedriver via apt.txt)
    - selenium
    # Other
    - pymannkendall
